<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ brand_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="page">
    <section class="card">
      <p class="badge">{{ brand_name }}</p>
      <h1>Today's Transistor news</h1>
      <p class="subtitle">
        전날 게시된 반도체 관련 뉴스를 AI가 3줄로 요약해
        <strong>매일</strong> 이메일로 보내드립니다.
      </p>

      <form id="subscribe-form" class="form">
        <label for="email">이메일 주소</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        >
        <button type="submit" id="submit-btn">구독하기</button>
      </form>

      <div id="status" class="status hidden" role="status" aria-live="polite"></div>

      <ul class="features">
        <li>매일 아침 자동 발송 (전날 KST 게시 기사)</li>
        <li>메일에서 5건 미리보기 · 전체 보기 버튼</li>
        <li>메일 하단 구독 취소 버튼 제공</li>
      </ul>
    </section>
  </main>

  <script>
    const form = document.getElementById("subscribe-form");
    const submitBtn = document.getElementById("submit-btn");
    const statusEl = document.getElementById("status");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const email = document.getElementById("email").value.trim();
      submitBtn.disabled = true;
      submitBtn.textContent = "구독 처리 중...";
      statusEl.className = "status loading";
      statusEl.textContent = "잠시만 기다려 주세요. 첫 뉴스레터 발송에 20~30초 걸릴 수 있습니다.";

      try {
        const body = new FormData();
        body.append("email", email);

        const response = await fetch("/subscribe", { method: "POST", body });
        let data;
        try {
          data = await response.json();
        } catch {
          throw new Error(
            response.status === 404
              ? "서버가 재시작이 필요합니다. 터미널에서 python app.py 를 다시 실행해 주세요."
              : `서버 응답 오류 (${response.status})`
          );
        }

        statusEl.className = data.success ? "status success" : "status error";
        statusEl.textContent = data.message || "요청 처리에 실패했습니다.";
      } catch (error) {
        statusEl.className = "status error";
        statusEl.textContent =
          error.message || "서버와 연결할 수 없습니다. python app.py 로 서버를 실행했는지 확인해 주세요.";
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "구독하기";
      }
    });
  </script>
</body>
</html>
